<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#f8f4ee" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a1714" media="(prefers-color-scheme: dark)" />
		<title>Warriors TKD</title>
		<link rel="icon" type="image/png" href="/img/logo.png">
		<link rel="apple-touch-icon" href="/img/logo.png">
		<script>
			(function () {
				try {
					var stored = localStorage.getItem("theme");
					var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
					var resolved = stored === "dark" || stored === "light" ? stored : (prefersDark ? "dark" : "light");
					if (resolved === "dark") document.documentElement.classList.add("dark");
				} catch (e) { /* localStorage unavailable; fall back to prefers-color-scheme via CSS */ }
			})();
		</script>
		<link rel="preload" href="/fonts/Satoshi-400.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="preload" href="/fonts/CabinetGrotesk-700.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="stylesheet" href="/styles.css">
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/client.js"></script>
	</body>
</html>
